*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#f8fafc;--card:#fff;--border:#e2e8f0;--border2:#f1f5f9;--text:#1e293b;--muted:#64748b;--faint:#94a3b8;--blue:#4a9eff;--green:#22c55e;--amber:#f59e0b;--red:#ef4444;--purple:#a855f7;--teal:#14b8a6}
body{font-family:'Inter','SF Pro Display','Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);padding:16px;max-width:1200px;margin:0 auto;line-height:1.5}
h1{font-size:22px;font-weight:800;text-align:center}
.sub{font-size:13px;color:var(--muted);text-align:center;margin:4px 0 20px}
.tabs{display:flex;gap:6px;flex-wrap:wrap;justify-content:center;margin-bottom:16px}
.tab{padding:8px 16px;border-radius:8px;border:1px solid var(--border);background:var(--card);color:var(--muted);font-size:13px;font-weight:600;cursor:pointer;font-family:inherit}
.tab:hover{border-color:var(--blue);color:var(--text)}
.tab.on{background:var(--blue);border-color:var(--blue);color:#fff}
.filter-box{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:16px}
.filter-label{font-size:11px;font-weight:600;color:var(--faint);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}
.chips{display:flex;gap:6px;flex-wrap:wrap}
.chip{padding:5px 12px;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;border:1px solid var(--border);background:var(--card);color:var(--faint)}
.chip:hover{border-color:var(--blue)}
.chip.on{border-color:var(--blue);background:#eff6ff;color:#2563eb}
.sort-row{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:12px}
.sort-row span{font-size:12px;font-weight:600;color:var(--faint)}
.sort-btn{padding:4px 10px;border-radius:6px;font-size:11px;font-weight:600;cursor:pointer;font-family:inherit;border:1px solid var(--border);background:var(--card);color:var(--faint)}
.sort-btn.on{border-color:var(--blue);background:#eff6ff;color:#2563eb}
.panel{display:none}.panel.active{display:block}
.company-card{background:var(--card);border:1px solid var(--border);border-radius:12px;margin-bottom:8px;overflow:hidden}
.card-header{padding:14px 16px;cursor:pointer;display:flex;align-items:center;gap:12px}
.card-header:hover{background:#fafbfc}
.rank-badge{min-width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;flex-shrink:0}
.rank-1{background:#fef9c3;color:#a16207;border:1.5px solid #fde68a}
.rank-2{background:#f1f5f9;color:#475569;border:1.5px solid #cbd5e1}
.rank-3{background:#fff7ed;color:#c2410c;border:1.5px solid #fed7aa}
.rank-n{background:#f8fafc;color:#94a3b8;border:1px solid #e2e8f0}
.card-info{flex:1;min-width:0}
.card-name{font-weight:700;font-size:15px}
.card-name small{font-size:11px;color:var(--faint);margin-left:8px;font-weight:400}
.card-meta{font-size:12px;color:var(--muted);margin-top:2px}
.card-scores{display:flex;gap:12px;align-items:center;flex-shrink:0}
.score-item{text-align:center}
.score-num{font-size:16px;font-weight:800}
.score-label{font-size:9px;color:var(--faint);text-transform:uppercase}
.arrow{font-size:14px;color:var(--faint);transition:transform .2s;flex-shrink:0}
.arrow.open{transform:rotate(180deg)}
.card-body{padding:0 16px 16px;border-top:1px solid var(--border2);display:none}
.card-body.open{display:block}
.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:12px}
.detail-section-title{font-size:11px;font-weight:700;color:var(--faint);text-transform:uppercase;margin-bottom:6px}
.detail-row{font-size:13px;line-height:1.8}
.detail-row strong{color:var(--text)}
.bar-row{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.bar-label{font-size:12px;min-width:90px;color:var(--muted)}
.bar-track{height:6px;background:var(--border);border-radius:3px;flex:1}
.bar-fill{height:100%;border-radius:3px;transition:width .3s}
.bar-val{font-size:12px;font-weight:700;min-width:16px}
.product-tags{display:flex;gap:6px;flex-wrap:wrap;margin-top:4px}
.product-tag{font-size:11px;padding:3px 8px;border-radius:6px;background:#f1f5f9;color:#475569}
.icp-text,.future-text{font-size:13px;color:#475569;margin-top:4px;line-height:1.5}
.cmp-wrap{overflow-x:auto}
.cmp-table{width:100%;border-collapse:collapse;font-size:12px;background:var(--card);border-radius:12px;overflow:hidden;border:1px solid var(--border)}
.cmp-table th{padding:10px 8px;text-align:center;font-weight:600;border-bottom:1px solid var(--border);font-size:11px;color:var(--muted);background:#f8fafc;position:sticky;top:0}
.cmp-table th:first-child{text-align:left;padding-left:12px}
.cmp-table td{padding:8px;text-align:center;border-bottom:1px solid var(--border2)}
.cmp-table td:first-child{text-align:left;padding-left:12px;font-weight:600;white-space:nowrap}
.badge{display:inline-block;padding:2px 10px;border-radius:12px;font-size:12px;font-weight:700}
.badge-s{background:#f0fdf4;color:var(--green)}.badge-m{background:#fffbeb;color:var(--amber)}.badge-w{background:#fef2f2;color:var(--red)}
.sw-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:12px}
.sw-card h3{font-size:15px;font-weight:700;margin-bottom:10px}
.sw-card h3 small{font-size:12px;color:var(--faint);margin-left:8px;font-weight:400}
.sw-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.sw-title{font-size:11px;font-weight:700;text-transform:uppercase;margin-bottom:6px}
.sw-title.g{color:var(--green)}.sw-title.r{color:var(--red)}
.sw-item{font-size:12px;color:#475569;padding:4px 0;border-bottom:1px solid #f8fafc;line-height:1.5}
.sent-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:12px}
.sent-card h3{font-size:15px;font-weight:700;margin-bottom:10px}
.sent-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.sent-title{font-size:11px;font-weight:700;text-transform:uppercase;margin-bottom:6px}
.sent-title.p{color:var(--purple)}.sent-title.b{color:var(--blue)}
.sent-text{font-size:13px;color:#475569;line-height:1.6}
.opp-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px;margin-bottom:16px}
.opp-card h2{font-size:16px;font-weight:700;margin-bottom:12px}
.opp-item{padding:12px 0;border-bottom:1px solid var(--border2)}
.opp-item:last-child{border-bottom:none}
.opp-item h4{font-weight:700;font-size:14px;margin-bottom:4px}
.opp-item p{font-size:13px;color:var(--muted);line-height:1.6}
.adv-box{background:#fffbeb;border:1px solid #fde68a;border-radius:12px;padding:16px}

.adv-box p{font-size:13px;color:#92400e;line-height:1.7}
.gf-section{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px;margin-bottom:16px}
.gf-section h2{font-size:16px;font-weight:700;margin-bottom:16px}
.gf-grid{display:grid;grid-template-columns:1fr;gap:10px}

.gf-cell p{font-size:12px;color:var(--muted);line-height:1.5}

.gf-badge{position:absolute;top:10px;right:10px;font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px}

.gf-thin{background:#fffbeb;border-color:#fde68a}.gf-thin .gf-badge{background:#fffbeb;color:var(--amber)}

.gf-heatmap{margin-top:16px}
.gf-hm-row{display:flex;align-items:center;margin-bottom:4px}
.gf-hm-label{font-size:11px;min-width:140px;color:var(--muted);font-weight:600}
.gf-hm-cells{display:flex;gap:2px;flex:1}
.gf-hm-cell{height:28px;border-radius:4px;flex:1;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:#fff;min-width:0}

.mkt-card .num{font-size:24px;font-weight:800;line-height:1.1}
.mkt-card .lbl{font-size:10px;font-weight:600;color:var(--faint);text-transform:uppercase;letter-spacing:.4px;margin-top:4px}

.mkt-section{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px;margin-bottom:16px}
.mkt-section h2{font-size:16px;font-weight:700;margin-bottom:4px}
.mkt-section .mkt-sub{font-size:13px;color:var(--muted);margin-bottom:16px}
.mkt-bar-wrap{margin-bottom:14px}
.mkt-bar-label{display:flex;justify-content:space-between;font-size:12px;font-weight:600;margin-bottom:4px}
.mkt-bar-track{height:16px;background:#f1f5f9;border-radius:8px;overflow:hidden;position:relative}
.mkt-bar-fill{height:100%;border-radius:8px;display:flex;align-items:center;padding-left:8px;font-size:10px;font-weight:700;color:#fff}
.mkt-row{display:flex;gap:16px;margin-bottom:20px}
.mkt-half{flex:1;min-width:0}
.mkt-list{font-size:13px;line-height:1.8;color:#475569}
.mkt-list strong{color:var(--text)}
.scenario-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-top:16px}
.scenario{border:1px solid var(--border);border-radius:12px;padding:16px;text-align:center}
.scenario h4{font-size:13px;font-weight:700;margin-bottom:8px}
.scenario .big{font-size:28px;font-weight:800;line-height:1}
.scenario p{font-size:11px;color:var(--muted);margin-top:6px;line-height:1.5}
.scenario-con{border-color:#fecaca;background:#fef2f2}
.scenario-base{border-color:#bbf7d0;background:#f0fdf4}
.scenario-bull{border-color:#bfdbfe;background:#eff6ff}
footer{text-align:center;padding:24px 0;font-size:11px;color:var(--faint)}
@media(max-width:768px){.detail-grid,.sw-grid,.sent-grid{grid-template-columns:1fr}.card-scores{display:none}.mkt-grid{grid-template-columns:repeat(2,1fr)}.scenario-grid{grid-template-columns:1fr}.mkt-row{flex-direction:column}}
</style>
</head>

window.setView=function(v){
  currentView=v;openCard=null;
  document.querySelectorAll(".panel").forEach(p=>p.classList.remove("active"));
  const map={"Overview":"p-overview","Compare":"p-compare","Market Opportunity":"p-market","Strengths & Weaknesses":"p-sw","Sentiment & ICP":"p-sentiment","Green Field":"p-greenfield","Opportunities":"p-opportunities"};
  document.getElementById(map[v]).classList.add("active");
  renderTabs();
};
window.toggleCompany=function(id){if(selectedIds.includes(id))selectedIds=selectedIds.filter(x=>x!==id);else selectedIds.push(id);openCard=null;renderAll()};
window.toggleAll=function(){selectedIds=selectedIds.length===C.length?[]:C.map(c=>c.id);openCard=null;renderAll()};
