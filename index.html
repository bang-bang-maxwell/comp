<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Competitive Intelligence Dashboard v2</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#f8fafc;--card:#fff;--border:#e2e8f0;--border2:#f1f5f9;--text:#1e293b;--muted:#64748b;--faint:#94a3b8;--blue:#4a9eff;--green:#22c55e;--amber:#f59e0b;--red:#ef4444;--purple:#a855f7;--teal:#14b8a6}
body{font-family:'Inter','SF Pro Display','Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);padding:16px;max-width:1200px;margin:0 auto;line-height:1.5}
h1{font-size:22px;font-weight:800;text-align:center}
.sub{font-size:13px;color:var(--muted);text-align:center;margin:4px 0 20px}
.tabs{display:flex;gap:6px;flex-wrap:wrap;justify-content:center;margin-bottom:16px}
.tab{padding:8px 16px;border-radius:8px;border:1px solid var(--border);background:var(--card);color:var(--muted);font-size:13px;font-weight:600;cursor:pointer;font-family:inherit}
.tab:hover{border-color:var(--blue);color:var(--text)}
.tab.on{background:var(--blue);border-color:var(--blue);color:#fff}
.filter-box{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:16px}
.filter-label{font-size:11px;font-weight:600;color:var(--faint);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}
.chips{display:flex;gap:6px;flex-wrap:wrap}
.chip{padding:5px 12px;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;border:1px solid var(--border);background:var(--card);color:var(--faint)}
.chip:hover{border-color:var(--blue)}
.chip.on{border-color:var(--blue);background:#eff6ff;color:#2563eb}
.sort-row{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:12px}
.sort-row span{font-size:12px;font-weight:600;color:var(--faint)}
.sort-btn{padding:4px 10px;border-radius:6px;font-size:11px;font-weight:600;cursor:pointer;font-family:inherit;border:1px solid var(--border);background:var(--card);color:var(--faint)}
.sort-btn.on{border-color:var(--blue);background:#eff6ff;color:#2563eb}
.panel{display:none}.panel.active{display:block}
.company-card{background:var(--card);border:1px solid var(--border);border-radius:12px;margin-bottom:8px;overflow:hidden}
.card-header{padding:14px 16px;cursor:pointer;display:flex;align-items:center;gap:12px}
.card-header:hover{background:#fafbfc}
.card-info{flex:1;min-width:0}
.card-name{font-weight:700;font-size:15px}
.card-name small{font-size:11px;color:var(--faint);margin-left:8px;font-weight:400}
.card-meta{font-size:12px;color:var(--muted);margin-top:2px}
.card-scores{display:flex;gap:12px;align-items:center;flex-shrink:0}
.score-item{text-align:center}
.score-num{font-size:16px;font-weight:800}
.score-label{font-size:9px;color:var(--faint);text-transform:uppercase}
.arrow{font-size:14px;color:var(--faint);transition:transform .2s;flex-shrink:0}
.arrow.open{transform:rotate(180deg)}
.card-body{padding:0 16px 16px;border-top:1px solid var(--border2);display:none}
.card-body.open{display:block}
.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:12px}
.detail-section-title{font-size:11px;font-weight:700;color:var(--faint);text-transform:uppercase;margin-bottom:6px}
.detail-row{font-size:13px;line-height:1.8}
.detail-row strong{color:var(--text)}
.bar-row{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.bar-label{font-size:12px;min-width:90px;color:var(--muted)}
.bar-track{height:6px;background:var(--border);border-radius:3px;flex:1}
.bar-fill{height:100%;border-radius:3px;transition:width .3s}
.bar-val{font-size:12px;font-weight:700;min-width:16px}
.product-tags{display:flex;gap:6px;flex-wrap:wrap;margin-top:4px}
.product-tag{font-size:11px;padding:3px 8px;border-radius:6px;background:#f1f5f9;color:#475569}
.icp-text,.future-text{font-size:13px;color:#475569;margin-top:4px;line-height:1.5}
.cmp-wrap{overflow-x:auto}
.cmp-table{width:100%;border-collapse:collapse;font-size:12px;background:var(--card);border-radius:12px;overflow:hidden;border:1px solid var(--border)}
.cmp-table th{padding:10px 8px;text-align:center;font-weight:600;border-bottom:1px solid var(--border);font-size:11px;color:var(--muted);background:#f8fafc;position:sticky;top:0}
.cmp-table th:first-child{text-align:left;padding-left:12px}
.cmp-table td{padding:8px;text-align:center;border-bottom:1px solid var(--border2)}
.cmp-table td:first-child{text-align:left;padding-left:12px;font-weight:600;white-space:nowrap}
.badge{display:inline-block;padding:2px 10px;border-radius:12px;font-size:12px;font-weight:700}
.badge-s{background:#f0fdf4;color:var(--green)}.badge-m{background:#fffbeb;color:var(--amber)}.badge-w{background:#fef2f2;color:var(--red)}
.sw-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:12px}
.sw-card h3{font-size:15px;font-weight:700;margin-bottom:10px}
.sw-card h3 small{font-size:12px;color:var(--faint);margin-left:8px;font-weight:400}
.sw-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.sw-title{font-size:11px;font-weight:700;text-transform:uppercase;margin-bottom:6px}
.sw-title.g{color:var(--green)}.sw-title.r{color:var(--red)}
.sw-item{font-size:12px;color:#475569;padding:4px 0;border-bottom:1px solid #f8fafc;line-height:1.5}
.sent-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:12px}
.sent-card h3{font-size:15px;font-weight:700;margin-bottom:10px}
.sent-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.sent-title{font-size:11px;font-weight:700;text-transform:uppercase;margin-bottom:6px}
.sent-title.p{color:var(--purple)}.sent-title.b{color:var(--blue)}
.sent-text{font-size:13px;color:#475569;line-height:1.6}
.opp-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px;margin-bottom:16px}
.opp-card h2{font-size:16px;font-weight:700;margin-bottom:12px}
.opp-item{padding:12px 0;border-bottom:1px solid var(--border2)}
.opp-item:last-child{border-bottom:none}
.opp-item h4{font-weight:700;font-size:14px;margin-bottom:4px}
.opp-item p{font-size:13px;color:var(--muted);line-height:1.6}
.adv-box{background:#fffbeb;border:1px solid #fde68a;border-radius:12px;padding:16px}
.adv-box h4{font-weight:700;font-size:14px;margin-bottom:8px;color:#92400e}
.adv-box p{font-size:13px;color:#92400e;line-height:1.7}
.gf-section{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px;margin-bottom:16px}
.gf-section h2{font-size:16px;font-weight:700;margin-bottom:16px}
.gf-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.gf-cell{border:1px solid var(--border);border-radius:10px;padding:14px;position:relative}
.gf-cell h4{font-size:13px;font-weight:700;margin-bottom:6px}
.gf-cell p{font-size:12px;color:var(--muted);line-height:1.5}
.gf-badge{position:absolute;top:10px;right:10px;font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px}
.gf-empty{background:#fef2f2;border-color:#fecaca}.gf-empty .gf-badge{background:#fef2f2;color:var(--red)}
.gf-thin{background:#fffbeb;border-color:#fde68a}.gf-thin .gf-badge{background:#fffbeb;color:var(--amber)}
.gf-open{background:#f0fdf4;border-color:#bbf7d0}.gf-open .gf-badge{background:#f0fdf4;color:var(--green)}
.gf-heatmap{margin-top:16px}
.gf-hm-row{display:flex;align-items:center;margin-bottom:4px}
.gf-hm-label{font-size:11px;min-width:140px;color:var(--muted);font-weight:600}
.gf-hm-cells{display:flex;gap:2px;flex:1}
.gf-hm-cell{height:28px;border-radius:4px;flex:1;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:#fff;min-width:0}
footer{text-align:center;padding:24px 0;font-size:11px;color:var(--faint)}
@media(max-width:768px){.detail-grid,.sw-grid,.sent-grid,.gf-grid{grid-template-columns:1fr}.card-scores{display:none}}
</style>
</head>

const VIEWS=["Overview","Compare","Strengths & Weaknesses","Sentiment & ICP","Green Field","Opportunities"];
let currentView="Overview",selectedIds=C.map(c=>c.id),sortBy="marketShare",openCard=null;

function tier(v){return v>=8?{l:"Strong",c:"#22c55e",bg:"#f0fdf4"}:v>=5?{l:"Mod",c:"#f59e0b",bg:"#fffbeb"}:{l:"Weak",c:"#ef4444",bg:"#fef2f2"}}
function filtered(){return C.filter(c=>selectedIds.includes(c.id)).sort((a,b)=>(b[sortBy]||0)-(a[sortBy]||0))}

function renderTabs(){document.getElementById("tabs").innerHTML=VIEWS.map(v=>`<button class="tab${currentView===v?" on":""}" onclick="setView('${v}')">${v}</button>`).join("")}
function renderFilters(){document.getElementById("filterChips").innerHTML=C.map(c=>`<button class="chip${selectedIds.includes(c.id)?" on":""}" onclick="toggleCompany('${c.id}')">${c.name}</button>`).join("")+`<button class="chip" style="background:#f1f5f9" onclick="toggleAll()">${selectedIds.length===C.length?"Clear All":"Select All"}</button>`}
function renderSortBtns(){document.getElementById("sortBtns").innerHTML=METRICS.map(m=>`<button class="sort-btn${sortBy===m.key?" on":""}" onclick="setSort('${m.key}')">${m.label}</button>`).join("")}

function renderOverview(){
  const list=document.getElementById("overviewList");
  list.innerHTML=filtered().map(c=>{
    const isOpen=openCard===c.id;
    const scores=METRICS.slice(0,3).map(m=>{const t=tier(c[m.key]);return`<div class="score-item"><div class="score-num" style="color:${t.c}">${c[m.key]}</div><div class="score-label">${m.label.split(" ")[0]}</div></div>`}).join("");
    const bars=METRICS.map(m=>{const t=tier(c[m.key]);return`<div class="bar-row"><span class="bar-label">${m.label}</span><div class="bar-track"><div class="bar-fill" style="width:${c[m.key]*10}%;background:${t.c}"></div></div><span class="bar-val" style="color:${t.c}">${c[m.key]}</span></div>`}).join("");
    const prods=c.products.map(p=>`<span class="product-tag">${p}</span>`).join("");
    return`<div class="company-card"><div class="card-header" onclick="toggleCard('${c.id}')"><div class="card-info"><div class="card-name">${c.name}<small>${c.url}</small></div><div class="card-meta">${c.category} · Est. ${c.estRevenue} · ${c.estEmployees} emp · Founded ${c.founded}</div></div><div class="card-scores">${scores}</div><span class="arrow${isOpen?" open":""}">▼</span></div><div class="card-body${isOpen?" open":""}"><div class="detail-grid"><div><div class="detail-section-title">Company Details</div><div class="detail-row"><strong>HQ:</strong> ${c.hq}<br><strong>Funding:</strong> ${c.funding}<br><strong>Format:</strong> ${c.format}<br><strong>Sodium:</strong> ${c.sodium}<br><strong>Sugar:</strong> ${c.sugar}<br><strong>Price:</strong> ${c.price}</div></div><div><div class="detail-section-title">Scores</div>${bars}</div></div><div style="margin-top:12px"><div class="detail-section-title">Products</div><div class="product-tags">${prods}</div></div><div style="margin-top:12px"><div class="detail-section-title">Target ICP</div><div class="icp-text">${c.icp}</div></div><div style="margin-top:12px"><div class="detail-section-title">Future Plans / Intel</div><div class="future-text">${c.futurePlans}</div></div></div></div>`;
  }).join("");
}

function renderCompare(){
  const f=filtered();
  const hdr=METRICS.map(m=>`<th>${m.label}</th>`).join("");
  const rows=f.map(c=>{
    const cells=METRICS.map(m=>{const t=tier(c[m.key]);const cls=t.c==="#22c55e"?"badge-s":t.c==="#f59e0b"?"badge-m":"badge-w";return`<td><span class="badge ${cls}">${c[m.key]}/10</span></td>`}).join("");
    return`<tr><td>${c.name}</td>${cells}<td style="font-weight:600">${c.estRevenue}</td><td style="color:#64748b">${c.founded}</td></tr>`;
  }).join("");
  document.getElementById("compareTable").innerHTML=`<table class="cmp-table"><thead><tr><th>Company</th>${hdr}<th>Revenue</th><th>Founded</th></tr></thead><tbody>${rows}</tbody></table>`;
}

function renderSW(){
  const el=document.getElementById("p-sw");
  el.innerHTML=filtered().map(c=>{
    const s=c.strengths.map(x=>`<div class="sw-item">✓ ${x}</div>`).join("");
    const w=c.weaknesses.map(x=>`<div class="sw-item">⚠ ${x}</div>`).join("");
    return`<div class="sw-card"><h3>${c.name}<small>${c.category}</small></h3><div class="sw-grid"><div><div class="sw-title g">Strengths</div>${s}</div><div><div class="sw-title r">Weaknesses</div>${w}</div></div></div>`;
  }).join("")
}

function renderSentiment(){

    {t:"No one owns 'clean-label pickle electrolyte for endurance'",d:"Pickle Juice Co has science but dated brand. Fast Pickle has clean brand but no science. SaltStick has science but no pickle. The intersection is wide open: a clean-ingredient, clinically-backed, pickle-based electrolyte for ultra/endurance athletes. Nobody occupies this exact position."},
    {t:"SEO/AEO is pathetically weak across the entire 20-company landscape",d:"Not a single company has meaningful organic search dominance for 'pickle juice for cramps', 'pickle electrolytes', or 'best electrolyte for endurance.' Average SEO score is 3.0/10. A new entrant with 20 well-optimized articles could rank for every valuable keyword in 6 months."},
    {t:"LLM citation is completely uncontested — 1.0-2.0 avg across all brands",d:"When someone asks ChatGPT 'what's the best pickle juice for athletes,' none of these brands have structured content for AI citation. Entity moats, FAQ schema, /llm-resources pages, and third-party mentions are the playbook. First mover advantage is massive and compounding."},
    {t:"The 'endurance athlete pickle shot' is a white space",d:"HOTSHOT targets nerves (not electrolytes). SaltStick targets electrolytes (capsules, not pickle). Pickle Juice Co targets cramps (but brand is old). Nobody makes a premium, portable pickle shot specifically for trail/ultra runners with altitude-specific formulation."},
    {t:"Subscription + community is unowned",d:"LMNT proved you can build a $200M+ brand on electrolytes + DTC + community. None of these pickle brands have built a real community. No podcast sponsors, no ambassador programs, no content flywheel. The pickle juice category is where LMNT was 5 years ago."},
    {t:"Powder format is essentially empty",d:"Only Divine Health makes a pickle powder, and it's targeting pickleball players with joint health — not athletes with electrolyte needs. A pickle-flavored electrolyte stick pack competing with LMNT/Drip Drop/Liquid IV doesn't exist."},
    {t:"Altitude-specific electrolyte is a niche nobody owns",d:"SLC, Denver, mountain athletes — altitude dehydration is real. The Right Stuff mentions altitude but doesn't own it. A brand built for 'mountain electrolytes' would be highly differentiated and geographically defensible."},
    {t:"Natural / ancestral positioning is underexploited",d:"Pickle brine is the oldest electrolyte solution in human history. Nobody tells that story well. The ancestral health / carnivore community would embrace a clean pickle electrolyte with the right messaging and ingredient transparency."},
    {t:"10+ Amazon-only brands prove demand, but none are building brands",d:"Peak Pickle, Pickle Athlete, OMG Pickles, PickleAde — all are Amazon-first commodity plays with zero brand equity. They prove demand exists but confirm that nobody is building a real DTC brand with community, content, and retention."},
    {t:"Legacy brands (Mt. Olive, Best Maid) leave the premium tier empty",d:"Mt. Olive at $0.70/shot and Best Maid at $0.10/oz own the value tier. But they have zero sports positioning, zero science claims, and zero DTC sophistication. The premium tier ($2.50-4.00/shot, clean label, athlete-endorsed) is wide open."}
  ];
  document.getElementById("p-opportunities").innerHTML=`
<div class="opp-card"><h2>Market Gaps & Competitive Opportunities</h2>${opps.map(o=>`<div class="opp-item"><h4>💡 ${o.t}</h4><p>${o.d}</p></div>`).join("")}</div>
<div class="adv-box"><h4>⚡ If You're Entering This Market, Your Unfair Advantages Are:</h4><p>
1. <strong>AEO/GEO expertise</strong> — you can build the SEO and AI citation moat nobody in this 20-company space has<br>
2. <strong>Endurance athlete credibility</strong> — Wasatch, WURL, trail running gives you authentic founder story<br>
3. <strong>SLC/altitude angle</strong> — geographic differentiation that resonates with mountain athletes<br>
4. <strong>Clean-label + ancestral positioning</strong> — aligns with your personal nutrition philosophy<br>
5. <strong>DTC + subscription playbook</strong> — you already know HubSpot, nurture flows, and conversion optimization<br>
6. <strong>The category is fragmented and sleepy</strong> — 20 companies analyzed and not one has both great product AND great marketing<br>
7. <strong>Powder format gap</strong> — nobody makes a pickle electrolyte stick pack for the LMNT/Liquid IV crowd<br>
8. <strong>Amazon demand validation</strong> — 10+ Amazon brands prove people are buying; none are building a brand worth remembering
</p></div>`;
}

function renderAll(){renderTabs();renderFilters();renderSortBtns();renderOverview();renderCompare();renderSW();renderSentiment();renderGreenField();renderOpportunities()}

window.setView=function(v){
  currentView=v;openCard=null;
  document.querySelectorAll(".panel").forEach(p=>p.classList.remove("active"));
  const map={"Overview":"p-overview","Compare":"p-compare","Strengths & Weaknesses":"p-sw","Sentiment & ICP":"p-sentiment","Green Field":"p-greenfield","Opportunities":"p-opportunities"};
  document.getElementById(map[v]).classList.add("active");
  renderTabs();
};
window.toggleCompany=function(id){if(selectedIds.includes(id))selectedIds=selectedIds.filter(x=>x!==id);else selectedIds.push(id);openCard=null;renderAll()};
window.toggleAll=function(){selectedIds=selectedIds.length===C.length?[]:C.map(c=>c.id);openCard=null;renderAll()};
window.setSort=function(key){sortBy=key;renderSortBtns();renderOverview()};
window.toggleCard=function(id){openCard=openCard===id?null:id;renderOverview()};
renderAll();
</script>
